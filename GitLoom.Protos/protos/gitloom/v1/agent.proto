syntax = "proto3";

package gitloom.v1;

option csharp_namespace = "GitLoom.Protos.V1";

// The agent lifecycle surface. Bodies are minimal in P2-02 (skeleton); the real
// spawn/attach/verify machinery lands in P2-06/P2-09. StreamAgentEvents is
// designed snapshot-then-deltas so a reconnecting client converges trivially.
service AgentService {
  rpc SpawnAgent(SpawnAgentRequest) returns (SpawnAgentResponse);
  rpc StopAgent(StopAgentRequest) returns (StopAgentResponse);
  rpc ListAgents(ListAgentsRequest) returns (ListAgentsResponse);
  rpc StreamAgentEvents(StreamAgentEventsRequest) returns (stream AgentEvent);
}

message SpawnAgentRequest {
  string repo_handle = 1;   // opaque handle, never a daemon filesystem path (G-14)
  string task_prompt = 2;
  string agent_kind = 3;    // adapter id, e.g. "claude-code"
  string model_api_key = 4; // SECRET
}

message SpawnAgentResponse {
  string agent_id = 1;
}

message StopAgentRequest {
  string agent_id = 1;
}

message StopAgentResponse {
  bool stopped = 1;
}

message ListAgentsRequest {}

message ListAgentsResponse {
  repeated AgentInfo agents = 1;
}

message StreamAgentEventsRequest {}

// Immutable per-agent snapshot the daemon exposes to the client. No paths (G-14).
message AgentInfo {
  string agent_id = 1;
  string agent_kind = 2;
  string state = 3;
}

// Snapshot-then-deltas: the daemon sends exactly one AgentEvent{snapshot} at the
// head of every subscription, then streams state/log deltas. A reconnecting
// client resyncs from the fresh snapshot with no server-side cursor.
message AgentEvent {
  string agent_id = 1;
  uint64 seq = 2;
  oneof event {
    AgentSnapshot snapshot = 3;
    StateChange state = 4;
    LogLine log = 5;
  }
}

message AgentSnapshot {
  repeated AgentInfo agents = 1;
}

message StateChange {
  string state = 1;
}

message LogLine {
  string line = 1;
}
