syntax = "proto3";

package gitloom.v1;

option csharp_namespace = "GitLoom.Protos.V1";

// P2-14 plan-approval + dual-mode orchestration surface: the coordinator chat bridge, the two-phase
// TaskPlan approval RPCs, and the kill switch.
//
// SECURITY (SA-1/F2 — binding): there is deliberately NO client-supplied approver / osIdentity field
// anywhere in this file. The recorded approver is derived daemon-side from the authenticated
// connection's OS peer credential — a client cannot influence it. Adding such a field is a rejection.

// The human plan-approval surface. The coordinator's `spawn_worker` tool lands a pending plan; the
// human approves/rejects it here. Approve carries ONLY the plan id — the approver identity is
// daemon-derived (SA-1/F2). BeginMerge/ConfirmMerge live on MergeQueueService and are denied to the
// coordinator role by the RoleInterceptor (they are NOT reachable from this surface).
service PlanApprovalService {
  // Snapshot-then-deltas of the pending + recently-decided plans.
  rpc StreamPlans(StreamPlansRequest) returns (stream PlanUpdate);
  // Approve a pending plan. NO identity field — the approver is the connection's OS peer credential.
  rpc ApprovePlan(ApprovePlanRequest) returns (ApprovePlanResponse);
  // Reject a pending plan. Nothing spawns; no worktree residue.
  rpc RejectPlan(RejectPlanRequest) returns (RejectPlanResponse);
}

message StreamPlansRequest {
  string coordinator_id = 1; // optional filter; empty = all coordinators
}

message PlanUpdate {
  repeated PlanEntry plans = 1;
  string pressure_signal = 2; // the S-8 "N plans pending" fact line, or empty
}

message PlanEntry {
  string plan_id = 1;
  string coordinator_id = 2;
  string title = 3;
  repeated string scope = 4;    // the load-bearing field (SA-1/F6 compares diffs against it)
  string approach = 5;
  string test_strategy = 6;
  string status = 7;            // PlanStatus name: Pending / Approved / Rejected
  double budget_usd = 8;
  // The daemon-derived approver identity, present only on an approved plan (SA-1/F2). This is an
  // OUTPUT field the daemon fills — never a client input.
  string approver_identity = 9;
}

message ApprovePlanRequest {
  string plan_id = 1;
  // NOTE: no approver / os_identity field by design (SA-1/F2). The daemon derives it.
}

message ApprovePlanResponse {
  bool approved = 1;
  string approver_identity = 2; // echoed back for the UI's decided-card tooltip (daemon-derived)
}

message RejectPlanRequest {
  string plan_id = 1;
  string reason = 2;
}

message RejectPlanResponse {
  bool rejected = 1;
}

// The always-visible emergency stop (SA-1/F4 + RT-D4). Engage freezes the queue FIRST, then fans out
// yield-all (timeout -> docker pause), then snapshots. Resume clears the freeze.
service KillSwitchService {
  rpc Engage(EngageKillRequest) returns (EngageKillResponse);
  rpc Resume(ResumeKillRequest) returns (ResumeKillResponse);
}

message EngageKillRequest {}

message EngageKillResponse {
  string kill_epoch_id = 1;
  bool queue_frozen = 2;
  int32 agents_yielded = 3;
  int32 agents_paused = 4;
  double deadline_seconds = 5; // the RT-D4 effective deadline (clamped at the fixed ceiling)
}

message ResumeKillRequest {}

message ResumeKillResponse {
  bool resumed = 1;
}
