syntax = "proto3";

package gitloom.v1;

option csharp_namespace = "GitLoom.Protos.V1";

// Repo provisioning + worktree management. RPCs and typed UNIMPLEMENTED stubs
// land in P2-02; the bodies land in P2-06 (bare-mirror provision, agent/<id>
// worktrees, gitloom-vm quarantine remote). All references are opaque handles
// (G-14) — no daemon filesystem paths cross the wire.
service RepoSyncService {
  rpc ProvisionRepo(ProvisionRepoRequest) returns (ProvisionRepoResponse);
  rpc CreateWorktree(CreateWorktreeRequest) returns (CreateWorktreeResponse);
  rpc ListWorktrees(ListWorktreesRequest) returns (ListWorktreesResponse);
  rpc RemoveWorktree(RemoveWorktreeRequest) returns (RemoveWorktreeResponse);
}

message ProvisionRepoRequest {
  string origin_url = 1;
  string credential_token = 2; // SECRET
}

message ProvisionRepoResponse {
  string repo_handle = 1; // opaque (G-14)
}

message CreateWorktreeRequest {
  string repo_handle = 1;
  string agent_id = 2;
}

message CreateWorktreeResponse {
  string worktree_handle = 1; // opaque (G-14)
}

message ListWorktreesRequest {
  string repo_handle = 1;
}

message ListWorktreesResponse {
  repeated WorktreeInfo worktrees = 1;
}

message WorktreeInfo {
  string worktree_handle = 1; // opaque (G-14)
  string agent_id = 2;
  string branch = 3;
}

message RemoveWorktreeRequest {
  string worktree_handle = 1;
}

message RemoveWorktreeResponse {
  bool removed = 1;
}
