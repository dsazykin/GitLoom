name: Package smoke (P2-48)

# Proves the packaging invariants of BOTH edition channels (Phase 3) on a real Windows publish:
#   * Pro    - the elevated helper and the GitLoomOS payload are co-located with the app so first-run
#              provisioning has no "file not found" elevation/import gap.
#   * Client - the small/fast head bundles NO payload and NO elevated helper (agent-platform-free).
# A full `vpk pack` (Setup.exe, self-update, signed publisher) is the owner's release box; this smoke
# verifies everything up to it that CI CAN check.

on:
  pull_request:
    branches: [main, phase2]
    paths:
      - "Mainguard.Pro.App/**"
      - "Mainguard.Client.App/**"
      - "Mainguard.App.Shell/**"
      - "installer/**"
      - "build/**"
      - ".github/workflows/package-smoke.yml"
  push:
    branches: [main, phase2]

jobs:
  windows-publish-smoke:
    name: Windows publish co-location smoke
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      # Stand in for the CI `payload-reproducible` artifact so the bundling target has something to copy.
      # (The real payload comes from build/gitloomos/build.sh; this smoke only checks co-location wiring.)
      - name: Stage a placeholder GitLoomOS payload
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build/gitloomos/out | Out-Null
          "smoke-placeholder" | Set-Content build/gitloomos/out/GitLoomOS.tar.gz

      - name: Publish Mainguard.Pro.App (self-contained win-x64)
        shell: pwsh
        run: >
          dotnet publish Mainguard.Pro.App/Mainguard.Pro.App.csproj -c Release -r win-x64 --self-contained true
          -o artifacts/publish/Mainguard
          /p:GitLoomOsPayload=${{ github.workspace }}/build/gitloomos/out/GitLoomOS.tar.gz

      - name: Assert elevated helper + payload are co-located and app version-stamps
        shell: pwsh
        run: |
          $dir = "artifacts/publish/Mainguard"
          $helper = Join-Path $dir "Mainguard.Installer.Elevated.exe"
          $payload = Join-Path $dir "payload/GitLoomOS.tar.gz"
          $app = Join-Path $dir "Mainguard.Pro.App.exe"
          if (-not (Test-Path $helper))  { throw "MISSING elevated helper: $helper" }
          if (-not (Test-Path $payload)) { throw "MISSING bundled payload: $payload" }
          if (-not (Test-Path $app))     { throw "MISSING app exe: $app" }
          $v = (Get-Item $app).VersionInfo
          Write-Host "App FileVersion:     $($v.FileVersion)"
          Write-Host "Helper FileDescription (UAC name): $((Get-Item $helper).VersionInfo.FileDescription)"
          if ((Get-Item $helper).VersionInfo.FileDescription -ne "GitLoom Setup") {
            throw "Elevated helper UAC name is not 'GitLoom Setup' — got '$((Get-Item $helper).VersionInfo.FileDescription)'"
          }
          Write-Host "Package co-location smoke PASSED."

  windows-client-publish-smoke:
    name: Windows client publish (small, agent-platform-free) smoke
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      # The Client head references Mainguard.App.Shell ONLY (no OOBE), so a plain publish is the whole story:
      # no placeholder payload is staged, because the Client channel must bundle none.
      - name: Publish Mainguard.Client.App (self-contained win-x64)
        shell: pwsh
        run: >
          dotnet publish Mainguard.Client.App/Mainguard.Client.App.csproj -c Release -r win-x64 --self-contained true
          -o artifacts/publish/Mainguard.Client

      - name: Assert the Client install is small - NO payload, NO elevated helper
        shell: pwsh
        run: |
          $dir = "artifacts/publish/Mainguard.Client"
          $app = Join-Path $dir "Mainguard.Client.App.exe"
          if (-not (Test-Path $app)) { throw "MISSING app exe: $app" }
          if (Test-Path (Join-Path $dir "payload")) {
            throw "Client head must NOT bundle a GitLoomOS payload, but payload/ exists in the publish."
          }
          if (Test-Path (Join-Path $dir "Mainguard.Installer.Elevated.exe")) {
            throw "Client head must NOT co-locate the elevated helper (it has no OOBE/UAC hand-off)."
          }
          $v = (Get-Item $app).VersionInfo
          Write-Host "Client App FileVersion: $($v.FileVersion)"
          $sizeMb = [math]::Round(((Get-ChildItem $dir -Recurse -File | Measure-Object Length -Sum).Sum / 1MB), 1)
          Write-Host "Client publish size: $sizeMb MB"
          Write-Host "Client publish smoke PASSED (no payload, no elevated helper)."
