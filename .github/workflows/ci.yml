name: CI

on:
  pull_request:
    branches: [main, phase2]
  push:
    branches: [main, phase2]

# Cancel superseded runs on the same branch/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Uses the SDK version pinned in global.json (10.0.100).
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

  format:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      # Verifies code matches .editorconfig. If this fails on an untouched file,
      # run `dotnet format` locally once, commit the result, then re-run.
      - name: Verify formatting
        run: dotnet format --verify-no-changes

  allowlist-shrink-guard:
    name: VT allowlist may only shrink (P2-04)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # P2-04 invariant 2: Mainguard.Tests/Terminal/known-failures.txt records the conformance cases
      # the interim engine is allowed to fail. Progress is monotonic — the list may lose lines
      # (a gap closed) but never gain them. A PR that ADDS a line fails here.
      - name: Ensure no lines were added vs phase2
        run: |
          set -euo pipefail
          ALLOWLIST=Mainguard.Tests/Terminal/known-failures.txt
          git fetch --no-tags origin phase2
          # Bootstrap: until the allowlist exists on phase2, there is no baseline to shrink from —
          # the PR that introduces it is exempt; the shrink-only rule is enforced from the next PR.
          if ! git cat-file -e "origin/phase2:$ALLOWLIST" 2>/dev/null; then
            echo "Allowlist not yet on origin/phase2 (introducing PR); shrink-only guard active from next PR."
            exit 0
          fi
          ADDED=$(git diff origin/phase2 -- "$ALLOWLIST" | grep '^+' | grep -v '^+++' || true)
          if [ -n "$ADDED" ]; then
            echo "::error::known-failures.txt gained lines; the P2-04 allowlist may only shrink:"
            echo "$ADDED"
            exit 1
          fi
          echo "Allowlist did not grow vs origin/phase2."

  sandbox-security:
    name: Sandbox security suite (RequiresDocker, Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      # P2-07 launch-tier security evidence (TI-P2-07 §A.5): the container hardening /
      # default-deny egress / A6 git-proxy / G2 key-custody suites need a real Docker host
      # (ubuntu-latest has dockerd; /tmp is ext4 so the agent worktree mount is accepted —
      # on Windows it is a C:\ path the hardened spec correctly refuses per G-11). The images
      # are built here, never at runtime (G-16); RequiresDockerFact skips the leg when they
      # are absent, so building them is what turns the suite on.
      #
      # Each image is stamped with gitloom.image.version=<Core constant> — the SAME value the daemon
      # spawn preflight and the app staleness probe compare against (SandboxImageVersions.cs). The
      # guard test keeps that constant == source; this step keeps the CI label == the constant, so the
      # RequiresDocker spawn leg's preflight sees a present-AND-current image. The labelled images are
      # also `docker save`d to build/images/<name>.tar (approach B: the app bundles them so a fresh /
      # upgraded VM `docker load`s CI-identical bytes offline — the label rides the tar).
      - name: Build + save the agent-base + egress-proxy images (version-labelled)
        run: |
          set -euo pipefail
          AGENT_VER="$(grep -oP 'const string AgentBase = "\K[0-9a-f]{64}' Mainguard.Agents/Agents/Sandbox/SandboxImageVersions.cs)"
          EGRESS_VER="$(grep -oP 'const string EgressProxy = "\K[0-9a-f]{64}' Mainguard.Agents/Agents/Sandbox/SandboxImageVersions.cs)"
          test -n "$AGENT_VER" && test -n "$EGRESS_VER"  # fail loudly if the constants were renamed/moved
          echo "agent-base version : $AGENT_VER"
          echo "egress-proxy version: $EGRESS_VER"
          docker build --label "gitloom.image.version=$AGENT_VER"  -t gitloom-agent-base:latest  images/gitloom-agent-base
          docker build --label "gitloom.image.version=$EGRESS_VER" -t gitloom-egress-proxy:latest images/gitloom-egress-proxy
          mkdir -p build/images
          docker save gitloom-agent-base:latest  -o build/images/gitloom-agent-base.tar
          docker save gitloom-egress-proxy:latest -o build/images/gitloom-egress-proxy.tar

      - name: Upload the CI-built jail image tars (approach B payload)
        uses: actions/upload-artifact@v4
        with:
          name: sandbox-image-tars
          path: build/images/*.tar
          retention-days: 7

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      # Runs only the RequiresDocker-tagged tests (the class-level Category trait) — the
      # egress matrix, docker inspect, persistent jail, cred/K tmpfs custody, the G2
      # memory-scrape denial, and the A6 read-only git-proxy push refusal.
      - name: RequiresDocker security suite
        run: >
          dotnet test Mainguard.Server.Tests/Mainguard.Server.Tests.csproj
          --no-build --configuration Release
          --filter "Category=RequiresDocker" --verbosity normal

  payload-reproducible:
    name: GitLoomOS payload hash-stable (P2-21)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # build.sh now also publishes the gitloomd daemon (Mainguard.Server, linux-x64) into the docker
      # context, so the SDK must be present. The publish is deterministic (Deterministic +
      # ContinuousIntegrationBuild, no ReadyToRun/single-file; deterministic portable PDBs), so both
      # builds below stay identical.
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      # P2-21 invariant 2 / test #5 (Tarball_Reproducible): build GitLoomOS.tar.gz TWICE from the
      # pinned inputs and assert an identical sha256. The pinned base digest + pinned packages +
      # deterministic repack (sorted, mtime=@0, numeric owner, gzip -n) — plus the deterministic daemon
      # publish — are what make this hold.
      - name: Build payload twice and compare sha256
        run: |
          set -euo pipefail
          GITLOOMOS_VERSION=ci-repro build/gitloomos/build.sh "$RUNNER_TEMP/out-a"
          GITLOOMOS_VERSION=ci-repro build/gitloomos/build.sh "$RUNNER_TEMP/out-b"
          A=$(cut -d' ' -f1 "$RUNNER_TEMP/out-a/GitLoomOS.tar.gz.sha256")
          B=$(cut -d' ' -f1 "$RUNNER_TEMP/out-b/GitLoomOS.tar.gz.sha256")
          echo "build A sha256: $A"
          echo "build B sha256: $B"
          if [ "$A" != "$B" ]; then
            echo "::error::GitLoomOS.tar.gz is not hash-stable across builds ($A != $B)"
            exit 1
          fi
          # The versioned release stamp must be present inside the payload.
          grep -q '^GITLOOMOS_VERSION=ci-repro' "$RUNNER_TEMP/out-a/gitloomos-release"
          grep -q '^BUILD_INPUTS_HASH=' "$RUNNER_TEMP/out-a/gitloomos-release"
          echo "Payload is hash-stable and version-stamped."

      # Daemon-startup smoke in the SHIPPED TARBALL, as the REAL service identity (uid 1000,
      # HOME=/home/gitloom, CWD=/ — the exact context systemd gives gitloomd in the VM). Three shipped
      # bugs (the missing-libicu SIGABRT loop, the GetFolderPath ""→relative-path EACCES loop, and the
      # repack flattening /home/gitloom to root:root) survived precisely because gitloomd had never once
      # been STARTED in its shipping rootfs before a user did it.
      #
      # It runs against `docker import` of the TARBALL, not the payload IMAGE, and that distinction is
      # the whole point: the image is always correct, and the repack is what breaks it. Smoking the
      # image tested the one artifact that could not carry the ownership bug — it even asserted the data
      # root exists, and passed, while the shipped tarball crash-looped on a user's machine. `docker
      # import` untars as root exactly like `wsl --import` does, so ownership/modes land as they will in
      # the VM. Asserts behaviour, not an exit code: correct ownership/modes, the process stays alive,
      # it actually listens on 127.0.0.1:5250 (DaemonOptions.DefaultPort → hex 1482 in /proc/net/tcp),
      # and its data root landed ABSOLUTE under $HOME.
      - name: Daemon startup smoke (shipped tarball, uid 1000)
        run: |
          set -euo pipefail
          docker import "$RUNNER_TEMP/out-a/GitLoomOS.tar.gz" gitloomos-shipped:ci-repro
          docker run --rm gitloomos-shipped:ci-repro bash -c '
            set -u
            # Fail fast and precisely: gitloomd cannot create ~/.gitloom if the packaging step handed
            # the service user a home it does not own, and a non-sticky /tmp breaks every non-root
            # writer in the VM. Both are packaging regressions, not daemon bugs — name them as such.
            own="$(stat -c "%u:%g" /home/gitloom)"
            if [ "$own" != "1000:1000" ]; then
              echo "::error::/home/gitloom is owned by $own, expected 1000:1000 — the repack flattened ownership; gitloomd cannot create its data root"
              exit 1
            fi
            tmpmode="$(stat -c "%a" /tmp)"
            if [ "$tmpmode" != "1777" ]; then
              echo "::error::/tmp is mode $tmpmode, expected 1777 — the repack dropped high mode bits (non-root tar extraction applies the umask)"
              exit 1
            fi
            setpriv --reuid=1000 --regid=1000 --init-groups \
              env HOME=/home/gitloom /opt/gitloom/gitloomd &
            pid=$!
            for i in $(seq 1 60); do
              if ! kill -0 "$pid" 2>/dev/null; then
                echo "::error::gitloomd exited prematurely (crash-loop class bug — check ICU/paths)"
                wait "$pid" || echo "exit code: $?"
                exit 1
              fi
              if grep -q ":1482 " /proc/net/tcp /proc/net/tcp6 2>/dev/null; then
                echo "gitloomd is alive and listening on 5250."
                if ! test -d /home/gitloom/.gitloom; then
                  echo "::error::daemon data root /home/gitloom/.gitloom was never created — path resolution regressed"
                  exit 1
                fi
                echo "Data root landed at /home/gitloom/.gitloom (absolute, service-user-owned)."
                exit 0
              fi
              sleep 1
            done
            echo "::error::gitloomd never began listening on 127.0.0.1:5250 within 60s"
            exit 1
          '

  installer-guardrails:
    name: Installer rejection-trigger greps (P2-21)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # P2-21 §7 reviewer script: RunOnce for resume and G-12 --shutdown must both be absent from the
      # installer tree and the payload/resume scripts.
      - name: No RunOnce, no --shutdown in installer/resume paths
        run: |
          set -euo pipefail
          if grep -rniI "RunOnce" installer/ build/gitloomos/ 2>/dev/null; then
            echo "::error::RunOnce found — resume MUST use the elevated Scheduled Task (P2-21 §7)"; exit 1
          fi
          if grep -rnI -- "--shutdown" installer/ build/gitloomos/ 2>/dev/null; then
            echo "::error::'--shutdown' found — G-12 forbids the VM-wide shutdown verb"; exit 1
          fi
          echo "Installer guardrails clean (no RunOnce, no --shutdown)."

  daemon-smoke:
    name: Daemon --local-dev smoke (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Build Mainguard.Server
        run: dotnet build Mainguard.Server/Mainguard.Server.csproj --no-restore --configuration Release

      # P2-02 invariant 4: the daemon builds AND runs on Windows via --local-dev. The
      # --smoke path starts the loopback host, self-probes an authenticated gRPC call,
      # prints nothing, and exits 0 (a non-loopback bind or auth break fails the job).
      - name: Daemon --local-dev smoke
        run: dotnet run --project Mainguard.Server --no-build --configuration Release -- --local-dev --smoke
