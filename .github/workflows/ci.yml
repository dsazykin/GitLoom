name: CI

on:
  pull_request:
    branches: [main, phase2]
  push:
    branches: [main, phase2]

# Cancel superseded runs on the same branch/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Uses the SDK version pinned in global.json (10.0.100).
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

  format:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      # Verifies code matches .editorconfig. If this fails on an untouched file,
      # run `dotnet format` locally once, commit the result, then re-run.
      - name: Verify formatting
        run: dotnet format --verify-no-changes

  allowlist-shrink-guard:
    name: VT allowlist may only shrink (P2-04)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # P2-04 invariant 2: GitLoom.Tests/Terminal/known-failures.txt records the conformance cases
      # the interim engine is allowed to fail. Progress is monotonic — the list may lose lines
      # (a gap closed) but never gain them. A PR that ADDS a line fails here.
      - name: Ensure no lines were added vs phase2
        run: |
          set -euo pipefail
          ALLOWLIST=GitLoom.Tests/Terminal/known-failures.txt
          git fetch --no-tags origin phase2
          # Bootstrap: until the allowlist exists on phase2, there is no baseline to shrink from —
          # the PR that introduces it is exempt; the shrink-only rule is enforced from the next PR.
          if ! git cat-file -e "origin/phase2:$ALLOWLIST" 2>/dev/null; then
            echo "Allowlist not yet on origin/phase2 (introducing PR); shrink-only guard active from next PR."
            exit 0
          fi
          ADDED=$(git diff origin/phase2 -- "$ALLOWLIST" | grep '^+' | grep -v '^+++' || true)
          if [ -n "$ADDED" ]; then
            echo "::error::known-failures.txt gained lines; the P2-04 allowlist may only shrink:"
            echo "$ADDED"
            exit 1
          fi
          echo "Allowlist did not grow vs origin/phase2."

  sandbox-security:
    name: Sandbox security suite (RequiresDocker, Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      # P2-07 launch-tier security evidence (TI-P2-07 §A.5): the container hardening /
      # default-deny egress / A6 git-proxy / G2 key-custody suites need a real Docker host
      # (ubuntu-latest has dockerd; /tmp is ext4 so the agent worktree mount is accepted —
      # on Windows it is a C:\ path the hardened spec correctly refuses per G-11). The images
      # are built here, never at runtime (G-16); RequiresDockerFact skips the leg when they
      # are absent, so building them is what turns the suite on.
      - name: Build the agent-base + egress-proxy images
        run: |
          docker build -t gitloom-agent-base:latest images/gitloom-agent-base
          docker build -t gitloom-egress-proxy:latest images/gitloom-egress-proxy

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      # Runs only the RequiresDocker-tagged tests (the class-level Category trait) — the
      # egress matrix, docker inspect, persistent jail, cred/K tmpfs custody, the G2
      # memory-scrape denial, and the A6 read-only git-proxy push refusal.
      - name: RequiresDocker security suite
        run: >
          dotnet test GitLoom.Server.Tests/GitLoom.Server.Tests.csproj
          --no-build --configuration Release
          --filter "Category=RequiresDocker" --verbosity normal

  payload-reproducible:
    name: GitLoomOS payload hash-stable (P2-21)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # build.sh now also publishes the gitloomd daemon (GitLoom.Server, linux-x64) into the docker
      # context, so the SDK must be present. The publish is deterministic (Deterministic +
      # ContinuousIntegrationBuild, no ReadyToRun/single-file/PDBs), so both builds below stay identical.
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      # P2-21 invariant 2 / test #5 (Tarball_Reproducible): build GitLoomOS.tar.gz TWICE from the
      # pinned inputs and assert an identical sha256. The pinned base digest + pinned packages +
      # deterministic repack (sorted, mtime=@0, numeric owner, gzip -n) — plus the deterministic daemon
      # publish — are what make this hold.
      - name: Build payload twice and compare sha256
        run: |
          set -euo pipefail
          GITLOOMOS_VERSION=ci-repro build/gitloomos/build.sh "$RUNNER_TEMP/out-a"
          GITLOOMOS_VERSION=ci-repro build/gitloomos/build.sh "$RUNNER_TEMP/out-b"
          A=$(cut -d' ' -f1 "$RUNNER_TEMP/out-a/GitLoomOS.tar.gz.sha256")
          B=$(cut -d' ' -f1 "$RUNNER_TEMP/out-b/GitLoomOS.tar.gz.sha256")
          echo "build A sha256: $A"
          echo "build B sha256: $B"
          if [ "$A" != "$B" ]; then
            echo "::error::GitLoomOS.tar.gz is not hash-stable across builds ($A != $B)"
            exit 1
          fi
          # The versioned release stamp must be present inside the payload.
          grep -q '^GITLOOMOS_VERSION=ci-repro' "$RUNNER_TEMP/out-a/gitloomos-release"
          grep -q '^BUILD_INPUTS_HASH=' "$RUNNER_TEMP/out-a/gitloomos-release"
          echo "Payload is hash-stable and version-stamped."

  installer-guardrails:
    name: Installer rejection-trigger greps (P2-21)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # P2-21 §7 reviewer script: RunOnce for resume and G-12 --shutdown must both be absent from the
      # installer tree and the payload/resume scripts.
      - name: No RunOnce, no --shutdown in installer/resume paths
        run: |
          set -euo pipefail
          if grep -rniI "RunOnce" installer/ build/gitloomos/ 2>/dev/null; then
            echo "::error::RunOnce found — resume MUST use the elevated Scheduled Task (P2-21 §7)"; exit 1
          fi
          if grep -rnI -- "--shutdown" installer/ build/gitloomos/ 2>/dev/null; then
            echo "::error::'--shutdown' found — G-12 forbids the VM-wide shutdown verb"; exit 1
          fi
          echo "Installer guardrails clean (no RunOnce, no --shutdown)."

  daemon-smoke:
    name: Daemon --local-dev smoke (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Build GitLoom.Server
        run: dotnet build GitLoom.Server/GitLoom.Server.csproj --no-restore --configuration Release

      # P2-02 invariant 4: the daemon builds AND runs on Windows via --local-dev. The
      # --smoke path starts the loopback host, self-probes an authenticated gRPC call,
      # prints nothing, and exits 0 (a non-loopback bind or auth break fails the job).
      - name: Daemon --local-dev smoke
        run: dotnet run --project GitLoom.Server --no-build --configuration Release -- --local-dev --smoke
